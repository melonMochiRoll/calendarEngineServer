name: Backend Deploy
run-name: 🚀 Deploying

on:
  push:
    branches: [ "release" ]

jobs:
  Deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    strategy:
      matrix:
        node-version: [24.x]

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: ✅ Check out repository code
      uses: actions/checkout@v4
    
    # - name: 🧾 Use Node.js ${{ matrix.node-version }}
    #   uses: actions/setup-node@v4
    #   with:
    #     node-version: ${{ matrix.node-version }}
    #     cache: 'npm'
        
    # - name: ✨ Install dependencies
    #   run: npm ci
    
    # - name: 🔨 Build Project
    #   run: npm run build -- --mode production
    
    # - name: 💻 Get Github Actions IP
    #   id: ip
    #   uses: haythem/public-ip@v1.2

    # - name: 🔧 Set Dist Filename
    #   id: dist
    #   run: |
    #     filename="calendar-engine-back-$(date +%Y%m%d_%H%M%S)"
    #     echo "dist_filename=$filename" >> $GITHUB_OUTPUT

    - name: 🔧 Authenticate to Google Cloud
      uses: 'google-github-actions/auth@v3'
      with:
        project_id: ${{ secrets.GOOGLE_PROJECT_ID }}
        workload_identity_provider: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}

    - name: 🔧 Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v3'

    - name: ✅ Test gcloud cli
      run: |
        gcloud compute ssh ${{ secrets.GOOGLE_VM_NAME }} --zone=${{ secrets.GOOGLE_VM_REGION }} --command="echo hello ssh"

